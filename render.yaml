services:
  # Backend API + Socket.IO Server
  - type: web
    name: whineboard-server
    env: node
    region: ohio
    plan: free

    rootDir: server

    buildCommand: npm install
    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production

  # Frontend React App
  - type: static_site
    name: whineboard-client

    rootDir: frontEnd

    buildCommand: npm install && npm run build
    staticPublishPath: build

    envVars:
      - key: REACT_APP_SERVER_URL
        value: https://whineboard-server.onrender.com